<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cuadro - Clima</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-panel {
            position: absolute;
            top: 30px;
            right: 32px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 20;
            min-width: 280px;
            transition: all 0.5s ease;
        }

        .ciudad {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: -5px;
        }

        .temp-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .temp {
            font-family: 'Outfit', sans-serif;
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .weather-icon-main {
            width: 64px;
            height: 64px;
            color: #ffcc00;
            filter: drop-shadow(0 0 10px rgba(255,204,0,0.4));
        }

        .hora-container {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.4rem;
            font-weight: 400;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            margin: 10px 0;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-item i {
            width: 18px;
            height: 18px;
            color: rgba(255,255,255,0.4);
        }

        .stat-item span {
            color: #ffffff;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
        }

        /* Slideshow */
        .slideshow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 0 20px;
        }

        .slideshow img {
            width: auto;
            max-width: 100%;
            height: calc(60vh - 32px);
            object-fit: cover;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.8s ease;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
        }

        .slideshow img.visible {
            opacity: 1;
        }

        .slide-titulo {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* RSS Panel */
        .rss-panel {
            position: absolute;
            top: 30px;
            left: 32px;
            width: 420px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 20;
        }

        .rss-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 5px;
        }

        .rss-header i {
            color: rgba(255, 255, 255, 0.4);
            width: 18px;
        }

        .rss-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .rss-badge {
            color: white;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .bg-salud { background: #ff3b30; }
        .bg-actualidad { background: #007aff; }
        .bg-deportes { background: #34c759; }

        .rss-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 24px;
            border-radius: 24px;
            opacity: 0;
            transform: translateX(-40px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 24px 48px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .rss-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .rss-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rss-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .rss-desc {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
            font-weight: 300;
        }

        .rss-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: #ff3b30;
            width: 0%;
            transition: width 12s linear;
        }
    </style>

</head>

<body>

    <!-- Panel RSS Noticias -->
    <div class="rss-panel">
        <div class="rss-header">
            <i data-lucide="newspaper"></i>
            <span class="rss-label">Noticias</span>
            <div id="rss-badge-container"></div>
        </div>
        <div id="rss-content" class="rss-item">
            <!-- Se llena dinámicamente -->
        </div>
    </div>

    <div class="weather-panel" id="weather-panel">
        <div class="ciudad" id="ciudad-nombre">Cargando...</div>
        <div class="temp-container">
            <div id="weather-icon" class="weather-icon-main"></div>
            <div class="temp" id="temp">--°C</div>
        </div>
        <div class="hora-container">
            <i data-lucide="clock" style="width: 20px;"></i>
            <div id="hora">--:--:--</div>
        </div>
        <div class="divider"></div>
        <div class="stats">
            <div class="stat-item">
                <i data-lucide="droplets"></i>
                <span id="humedad">--%</span>
            </div>
            <div class="stat-item" style="justify-content: flex-end;">
                <i data-lucide="thermometer-sun" style="color: #ff9500;"></i>
                <span id="max">--°C</span>
            </div>
            <div class="stat-item">
                <i data-lucide="wind"></i>
                <span id="viento">--km/h</span>
            </div>
            <div class="stat-item" style="justify-content: flex-end;">
                <i data-lucide="thermometer-snowflake" style="color: #007aff;"></i>
                <span id="min">--°C</span>
            </div>
        </div>
    </div>

    <!-- Slideshow fotos -->
    <div class="slideshow">
        <img id="slide-img" src="" alt="foto" />
        <div class="slide-titulo" id="slide-titulo"></div>
    </div>

    <script>
        // obtener índice de hora actual (usando hora local)
        function obtenerIndiceActual(times) {
            const ahora = new Date();
            // Formato local YYYY-MM-DDTHH para comparar con el array del API
            const pad = n => String(n).padStart(2, '0');
            const horaLocal = `${ahora.getFullYear()}-${pad(ahora.getMonth() + 1)}-${pad(ahora.getDate())}T${pad(ahora.getHours())}`;
            let idx = times.findIndex(t => t.startsWith(horaLocal));
            // fallback: buscar por UTC si no hay coincidencia local
            if (idx === -1) {
                const horaUTC = ahora.toISOString().slice(0, 13);
                idx = times.findIndex(t => t.startsWith(horaUTC));
            }
            return idx !== -1 ? idx : 0;
        }

        // reloj en vivo
        function actualizarHora() {
            const ahora = new Date();
            document.getElementById('hora').innerText = ahora.toLocaleTimeString();
        }

        const listaCiudades = ['cartagena', 'barranquilla', 'monteria', 'santa marta', 'bogota', 'medellin'];
        let indiceCiudad = 0;

        // Mapeo de códigos de clima a iconos de Lucide
        function obtenerIconoClima(codigo) {
            // Códigos WMO: https://open-meteo.com/en/docs
            if (codigo === 0) return 'sun'; // Despejado
            if (codigo >= 1 && codigo <= 3) return 'cloud-sun'; // Parcialmente nublado
            if (codigo >= 45 && codigo <= 48) return 'cloud-fog'; // Niebla
            if (codigo >= 51 && codigo <= 67) return 'cloud-rain'; // Llovizna/Lluvia
            if (codigo >= 71 && codigo <= 77) return 'snowflake'; // Nieve
            if (codigo >= 80 && codigo <= 82) return 'cloud-rain-wind'; // Chubascos
            if (codigo >= 95) return 'cloud-lightning'; // Tormenta
            return 'cloud';
        }

        // cargar clima
        async function cargarClima() {
            try {
                const ciudadActual = listaCiudades[indiceCiudad];
                const res = await fetch(`/api/clima?ciudad=${encodeURIComponent(ciudadActual)}`);
                const data = await res.json();

                const index = obtenerIndiceActual(data.hourly.time);

                const temp = data.hourly.temperature_2m[index];
                const humedad = data.hourly.relative_humidity_2m[index];
                const weathercode = data.hourly.weathercode ? data.hourly.weathercode[index] : 0;
                const viento = data.hourly.windspeed_10m ? data.hourly.windspeed_10m[index] : '--';

                const temps = data.hourly.temperature_2m;

                // Animación de entrada
                const panel = document.getElementById('weather-panel');
                panel.style.opacity = '0.5';
                panel.style.transform = 'translateY(-10px)';

                setTimeout(() => {
                    document.getElementById('ciudad-nombre').innerText = data.nombreCiudad;
                    document.getElementById('temp').innerText = Math.round(temp) + "°C";
                    document.getElementById('humedad').innerText = humedad + "%";
                    document.getElementById('max').innerText = Math.round(Math.max(...temps)) + "°C";
                    document.getElementById('min').innerText = Math.round(Math.min(...temps)) + "°C";
                    if (document.getElementById('viento')) {
                        document.getElementById('viento').innerText = viento + "km/h";
                    }

                    // Actualizar icono
                    const iconName = obtenerIconoClima(weathercode);
                    const iconContainer = document.getElementById('weather-icon');
                    iconContainer.innerHTML = `<i data-lucide="${iconName}" style="width: 100%; height: 100%;"></i>`;
                    
                    lucide.createIcons(); // Re-inicializar iconos

                    panel.style.opacity = '1';
                    panel.style.transform = 'translateY(0)';
                }, 300);

                // Avanzar a la siguiente ciudad
                indiceCiudad = (indiceCiudad + 1) % listaCiudades.length;

            } catch (e) {
                console.error(e);
            }
        }

        // inicial
        cargarClima();
        actualizarHora();

        // intervalos optimizados
        setInterval(cargarClima, 10000); // Rotar ciudad cada 10 segundos
        setInterval(actualizarHora, 1000); // reloj

        // slideshow de fotos
        async function iniciarSlideshow() {
            try {
                const res = await fetch('/api/fotos');
                const data = await res.json();
                const fotos = data.fotos;
                if (!fotos || fotos.length === 0) return;

                const img = document.getElementById('slide-img');
                const titulo = document.getElementById('slide-titulo');
                let indice = 0;

                function mostrarFoto() {
                    img.classList.remove('visible');
                    setTimeout(() => {
                        const foto = fotos[indice];
                        img.src = foto.url;
                        titulo.innerText = foto.titulo || '';
                        img.onload = () => img.classList.add('visible');
                        img.onerror = () => console.error('Error cargando foto:', foto.url);
                        indice = (indice + 1) % fotos.length;
                    }, 800);
                }

                mostrarFoto();
                setInterval(mostrarFoto, 10000);

            } catch (e) {
                console.error('Error cargando fotos:', e);
            }
        }

        // RSS de noticias
        async function cargarRSS() {
            try {
                const res = await fetch('/api/rss');
                const noticias = await res.json();
                if (!noticias || noticias.length === 0) return;

                const container = document.getElementById('rss-content');
                let index = 0;

                function mostrarSiguiente() {
                    container.classList.remove('visible');
                    
                    setTimeout(() => {
                        const item = noticias[index];
                        // Limpiar descripción de tags HTML si existen
                        const desc = (item.contentSnippet || item.content || '').replace(/<[^>]*>?/gm, '').trim();
                        
                        // Formatear fecha sutilmente
                        const fecha = item.isoDate ? new Date(item.isoDate).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }) : '';
                        
                        // Badge dinámico
                        const catClass = `bg-${(item.categoria || 'actualidad').toLowerCase()}`;
                        document.getElementById('rss-badge-container').innerHTML = `
                            <span class="rss-badge ${catClass}">${item.categoria}</span>
                        `;

                        container.innerHTML = `
                            <div class="rss-date"><i data-lucide="calendar" style="width: 12px;"></i> ${fecha}</div>
                            <div class="rss-title">${item.title}</div>
                            <div class="rss-desc">${desc}</div>
                            <div class="rss-progress" id="rss-bar"></div>
                        `;
                        
                        lucide.createIcons();
                        container.classList.add('visible');
                        
                        // Iniciar barra de progreso
                        const bar = document.getElementById('rss-bar');
                        setTimeout(() => {
                            if (bar) bar.style.width = '100%';
                        }, 50);

                        index = (index + 1) % noticias.length;
                    }, 800);
                }

                mostrarSiguiente();
                setInterval(mostrarSiguiente, 12000); // Rotar cada 12 segundos

            } catch (e) {
                console.error('Error cargando RSS:', e);
            }
        }

        iniciarSlideshow();
        cargarRSS();
    </script>

</body>

</html>
