<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cuadro - Clima</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .weather-panel {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .ciudad {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .temp {
            font-size: 5.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .hora {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 1px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 3px 0;
        }

        .stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
        }

        .stat-item {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.65);
        }

        .stat-item span {
            color: #ffffff;
            font-weight: bold;
        }

        /* Slideshow */
        .slideshow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 0 20px;
        }

        .slideshow img {
            width: auto;
            max-width: 100%;
            height: calc(60vh - 32px);
            object-fit: cover;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.8s ease;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.8);
        }

        .slideshow img.visible {
            opacity: 1;
        }

        .slide-titulo {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* RSS Panel */
        .rss-panel {
            position: absolute;
            top: 20px;
            left: 24px;
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .rss-header {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding-left: 5px;
        }

        .rss-item {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border-left: 4px solid #ff3b30;
            padding: 20px;
            border-radius: 0 16px 16px 0;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .rss-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .rss-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.4;
            color: #ffffff;
        }

        .rss-desc {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }
    </style>

</head>

<body>

    <!-- Panel RSS Noticias -->
    <div class="rss-panel">
        <div class="rss-header">Cartagena Actualidad • Salud</div>
        <div id="rss-content" class="rss-item">
            <!-- Se llena dinámicamente -->
        </div>
    </div>

    <div class="weather-panel">
        <div class="ciudad" id="ciudad-nombre">Cartagena</div>
        <div class="temp" id="temp">--°C</div>
        <div class="hora" id="hora">--:--</div>
        <div class="divider"></div>
        <div class="stats">
            <div class="stat-item">Humedad: <span id="humedad">--%</span></div>
            <div class="stat-item">Máx: <span id="max">--°C</span></div>
            <div class="stat-item">Mín: <span id="min">--°C</span></div>
        </div>
    </div>

    <!-- Slideshow fotos -->
    <div class="slideshow">
        <img id="slide-img" src="" alt="foto" />
        <div class="slide-titulo" id="slide-titulo"></div>
    </div>

    <script>
        // obtener índice de hora actual (usando hora local)
        function obtenerIndiceActual(times) {
            const ahora = new Date();
            // Formato local YYYY-MM-DDTHH para comparar con el array del API
            const pad = n => String(n).padStart(2, '0');
            const horaLocal = `${ahora.getFullYear()}-${pad(ahora.getMonth() + 1)}-${pad(ahora.getDate())}T${pad(ahora.getHours())}`;
            let idx = times.findIndex(t => t.startsWith(horaLocal));
            // fallback: buscar por UTC si no hay coincidencia local
            if (idx === -1) {
                const horaUTC = ahora.toISOString().slice(0, 13);
                idx = times.findIndex(t => t.startsWith(horaUTC));
            }
            return idx !== -1 ? idx : 0;
        }

        // reloj en vivo
        function actualizarHora() {
            const ahora = new Date();
            document.getElementById('hora').innerText = ahora.toLocaleTimeString();
        }

        const listaCiudades = ['cartagena', 'barranquilla', 'monteria', 'santa marta', 'bogota', 'medellin'];
        let indiceCiudad = 0;

        // cargar clima
        async function cargarClima() {
            try {
                const ciudadActual = listaCiudades[indiceCiudad];
                const res = await fetch(`/api/clima?ciudad=${encodeURIComponent(ciudadActual)}`);
                const data = await res.json();

                const index = obtenerIndiceActual(data.hourly.time);

                const temp = data.hourly.temperature_2m[index];
                const humedad = data.hourly.relative_humidity_2m[index];

                const temps = data.hourly.temperature_2m;

                document.getElementById('ciudad-nombre').innerText = data.nombreCiudad;
                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('humedad').innerText = humedad + "%";
                document.getElementById('max').innerText = Math.max(...temps) + "°C";
                document.getElementById('min').innerText = Math.min(...temps) + "°C";

                // Avanzar a la siguiente ciudad para la próxima vez que se llame
                indiceCiudad = (indiceCiudad + 1) % listaCiudades.length;

            } catch (e) {
                console.error(e);
            }
        }

        // inicial
        cargarClima();
        actualizarHora();

        // intervalos optimizados
        setInterval(cargarClima, 10000); // Rotar ciudad cada 10 segundos
        setInterval(actualizarHora, 1000); // reloj

        // slideshow de fotos
        async function iniciarSlideshow() {
            try {
                const res = await fetch('/api/fotos');
                const data = await res.json();
                const fotos = data.fotos;
                if (!fotos || fotos.length === 0) return;

                const img = document.getElementById('slide-img');
                const titulo = document.getElementById('slide-titulo');
                let indice = 0;

                function mostrarFoto() {
                    img.classList.remove('visible');
                    setTimeout(() => {
                        const foto = fotos[indice];
                        img.src = foto.url;
                        titulo.innerText = foto.titulo || '';
                        img.onload = () => img.classList.add('visible');
                        img.onerror = () => console.error('Error cargando foto:', foto.url);
                        indice = (indice + 1) % fotos.length;
                    }, 800);
                }

                mostrarFoto();
                setInterval(mostrarFoto, 10000);

            } catch (e) {
                console.error('Error cargando fotos:', e);
            }
        }

        // RSS de noticias
        async function cargarRSS() {
            try {
                const res = await fetch('/api/rss');
                const noticias = await res.json();
                if (!noticias || noticias.length === 0) return;

                const container = document.getElementById('rss-content');
                let index = 0;

                function mostrarSiguiente() {
                    container.classList.remove('visible');
                    
                    setTimeout(() => {
                        const item = noticias[index];
                        // Limpiar descripción de tags HTML si existen
                        const desc = (item.contentSnippet || item.content || '').replace(/<[^>]*>?/gm, '');
                        
                        container.innerHTML = `
                            <div class="rss-title">${item.title}</div>
                            <div class="rss-desc">${desc}</div>
                        `;
                        container.classList.add('visible');
                        index = (index + 1) % noticias.length;
                    }, 800);
                }

                mostrarSiguiente();
                setInterval(mostrarSiguiente, 12000); // Rotar cada 12 segundos

            } catch (e) {
                console.error('Error cargando RSS:', e);
            }
        }

        iniciarSlideshow();
        cargarRSS();
    </script>

</body>

</html>
