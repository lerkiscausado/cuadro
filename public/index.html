<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cuadro - Clima</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .weather-panel {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .ciudad {
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .temp {
            font-size: 3.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .hora {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 1px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 3px 0;
        }

        .stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
        }

        .stat-item {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.65);
        }

        .stat-item span {
            color: #ffffff;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="weather-panel">
        <div class="ciudad">Cartagena</div>
        <div class="temp" id="temp">--°C</div>
        <div class="hora" id="hora">--:--</div>
        <div class="divider"></div>
        <div class="stats">
            <div class="stat-item">Humedad: <span id="humedad">--%</span></div>
            <div class="stat-item">Máx: <span id="max">--°C</span></div>
            <div class="stat-item">Mín: <span id="min">--°C</span></div>
        </div>
    </div>

    <script>
        // obtener índice de hora actual
        function obtenerIndiceActual(times) {
            const ahora = new Date();
            const horaActual = ahora.toISOString().slice(0, 13);
            return times.findIndex(t => t.startsWith(horaActual));
        }

        // reloj en vivo
        function actualizarHora() {
            const ahora = new Date();
            document.getElementById('hora').innerText = ahora.toLocaleTimeString();
        }

        // cargar clima
        async function cargarClima() {
            try {
                const res = await fetch('/api/clima');
                const data = await res.json();

                const index = obtenerIndiceActual(data.hourly.time);

                const temp = data.hourly.temperature_2m[index];
                const humedad = data.hourly.relative_humidity_2m[index];

                const temps = data.hourly.temperature_2m;

                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('humedad').innerText = humedad + "%";
                document.getElementById('max').innerText = Math.max(...temps) + "°C";
                document.getElementById('min').innerText = Math.min(...temps) + "°C";

            } catch (e) {
                console.error(e);
            }
        }

        // inicial
        cargarClima();
        actualizarHora();

        // intervalos optimizados
        setInterval(cargarClima, 600000); // 10 min
        setInterval(actualizarHora, 1000); // reloj
    </script>

</body>

</html>
