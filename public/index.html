<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cuadro - Clima</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000000;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .weather-panel {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .ciudad {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .temp {
            font-size: 5.5rem;
            font-weight: bold;
            line-height: 1;
        }

        .hora {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 1px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: 3px 0;
        }

        .stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
        }

        .stat-item {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.65);
        }

        .stat-item span {
            color: #ffffff;
            font-weight: bold;
        }

        /* Slideshow */
        .slideshow {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 0 20px;
        }

        .slideshow img {
            width: auto;
            max-width: 100%;
            height: calc(60vh - 32px);
            object-fit: cover;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.8s ease;
            box-shadow: 0 12px 48px rgba(0,0,0,0.8);
        }

        .slideshow img.visible {
            opacity: 1;
        }

        .slide-titulo {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.45);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>

</head>

<body>

    <div class="weather-panel">
        <div class="ciudad">Cartagena</div>
        <div class="temp" id="temp">--°C</div>
        <div class="hora" id="hora">--:--</div>
        <div class="divider"></div>
        <div class="stats">
            <div class="stat-item">Humedad: <span id="humedad">--%</span></div>
            <div class="stat-item">Máx: <span id="max">--°C</span></div>
            <div class="stat-item">Mín: <span id="min">--°C</span></div>
        </div>
    </div>

    <!-- Slideshow fotos -->
    <div class="slideshow">
        <img id="slide-img" src="" alt="foto" />
        <div class="slide-titulo" id="slide-titulo"></div>
    </div>

    <script>
        // obtener índice de hora actual (usando hora local)
        function obtenerIndiceActual(times) {
            const ahora = new Date();
            // Formato local YYYY-MM-DDTHH para comparar con el array del API
            const pad = n => String(n).padStart(2, '0');
            const horaLocal = `${ahora.getFullYear()}-${pad(ahora.getMonth()+1)}-${pad(ahora.getDate())}T${pad(ahora.getHours())}`;
            let idx = times.findIndex(t => t.startsWith(horaLocal));
            // fallback: buscar por UTC si no hay coincidencia local
            if (idx === -1) {
                const horaUTC = ahora.toISOString().slice(0, 13);
                idx = times.findIndex(t => t.startsWith(horaUTC));
            }
            return idx !== -1 ? idx : 0;
        }

        // reloj en vivo
        function actualizarHora() {
            const ahora = new Date();
            document.getElementById('hora').innerText = ahora.toLocaleTimeString();
        }

        // cargar clima
        async function cargarClima() {
            try {
                const res = await fetch('/api/clima');
                const data = await res.json();

                const index = obtenerIndiceActual(data.hourly.time);

                const temp = data.hourly.temperature_2m[index];
                const humedad = data.hourly.relative_humidity_2m[index];

                const temps = data.hourly.temperature_2m;

                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('humedad').innerText = humedad + "%";
                document.getElementById('max').innerText = Math.max(...temps) + "°C";
                document.getElementById('min').innerText = Math.min(...temps) + "°C";

            } catch (e) {
                console.error(e);
            }
        }

        // inicial
        cargarClima();
        actualizarHora();

        // intervalos optimizados
        setInterval(cargarClima, 600000); // 10 min
        setInterval(actualizarHora, 1000); // reloj

        // slideshow de fotos
        async function iniciarSlideshow() {
            try {
                const res = await fetch('/api/fotos');
                const data = await res.json();
                const fotos = data.fotos;
                if (!fotos || fotos.length === 0) return;

                const img = document.getElementById('slide-img');
                const titulo = document.getElementById('slide-titulo');
                let indice = 0;

                function mostrarFoto() {
                    img.classList.remove('visible');
                    setTimeout(() => {
                        const foto = fotos[indice];
                        img.src = foto.url;
                        titulo.innerText = foto.titulo || '';
                        img.onload = () => img.classList.add('visible');
                        img.onerror = () => console.error('Error cargando foto:', foto.url);
                        indice = (indice + 1) % fotos.length;
                    }, 800);
                }

                mostrarFoto();
                setInterval(mostrarFoto, 5000);

            } catch (e) {
                console.error('Error cargando fotos:', e);
            }
        }

        iniciarSlideshow();
    </script>

</body>

</html>
